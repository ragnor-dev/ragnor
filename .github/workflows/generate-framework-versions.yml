name: Generate Framework Versions

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate version files
        run: python3 './@scripts/merge_specs_v1.py'
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions/
          git diff --cached --quiet || git commit -m "chore: regenerate versions [skip ci]"
          git push

      - name: Upload generated versions artifact
        uses: actions/upload-artifact@v4
        with:
          name: framework-versions
          path: versions/*.md
